# .github/workflows/ci.yml
name: Python CI

# 触发条件：只要有人 push 代码，或者提了 Pull Request，就自动运行
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # CI 会在一个全新的 Ubuntu 虚拟机里执行

    steps:
      - name: Checkout code  # 第一步：把你的代码拉到 CI 机器上
        uses: actions/checkout@v4

      - name: Set up Python # 第二步：安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies # 第三步：安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests  # 第四步：跑测试！
        run: |
          pytest